name: "HA Uptime & Outage Monitor"
slug: "ha_uptime_outage_monitor"
version: "0.1.3"
description: "Local heartbeat, restart and connectivity downtime monitor for Home Assistant."
url: "https://developers.home-assistant.io/docs/add-ons/"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
homeassistant_api: true
webui: "http://[HOST]:[PORT:8098]"
ports:
  8098/tcp: 8098
ports_description:
  8098/tcp: "Web dashboard"
options:
  heartbeat_interval_seconds: 60
  outage_threshold_seconds: 120
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  router_host: "192.168.178.1"
  internet_host: "1.1.1.1"
  enable_ping_monitoring: true
  enable_homeassistant_monitoring: true
  homeassistant_check_interval_seconds: 30
  homeassistant_failure_threshold_seconds: 90
  homeassistant_startup_grace_seconds: 300
schema:
  heartbeat_interval_seconds: "int(10,3600)"
  outage_threshold_seconds: "int(0,86400)"
  mqtt_host: "str"
  mqtt_port: "int(1,65535)"
  mqtt_username: "str"
  mqtt_password: "password"
  router_host: "str"
  internet_host: "str"
  enable_ping_monitoring: "bool"
  enable_homeassistant_monitoring: "bool"
  homeassistant_check_interval_seconds: "int(10,3600)"
  homeassistant_failure_threshold_seconds: "int(0,86400)"
  homeassistant_startup_grace_seconds: "int(0,3600)"
